<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>アイヌ語の表記変換ブックマークレット</title>
	<link rel="stylesheet" href="/toracatman.css">
	<style>
		textarea {
			width: 100%;
			height: 20rem;
		}
		.none {
			display: none;
		}
		@media screen and (min-width: 768px) {
			textarea {
				width: 50rem;
			}
		}
	</style>
</head>
<body>
	<form name="form1">
		<p>文字</p>
		<p>
			<label><input type="radio" name="letter" value="0" onchange="changeLetter();" checked>アコㇿイタㇰ</label>
			<label><input type="radio" name="letter" value="1" onchange="changeLetter();">拡張カタカナ</label>
			<label><input type="radio" name="letter" value="2" onchange="changeLetter();">拡張ひらがな</label>
			<label><input type="radio" name="letter" value="3" onchange="changeLetter();">キリル文字</label>
		</p>
		<div id="akoritak">
			<p>tu</p>
			<p>
				<label><input type="radio" name="tu" value="0" checked>トゥ</label>
				<label><input type="radio" name="tu" value="1">ト゚</label>
				<label><input type="radio" name="tu" value="2">ツ゚</label>
			</p>
			<p>ce</p>
			<p>
				<label><input type="radio" name="ce" value="0" checked>チェ</label>
				<label><input type="radio" name="ce" value="1">セ゚</label>
			</p>
			<p>-y, -w</p>
			<p>
				<label><input type="radio" name="yw" value="0" checked>イ、ウ</label>
				<label><input type="radio" name="yw" value="1">ィ、ゥ</label>
			</p>
			<p>子音の連続</p>
			<p>
				<label><input type="radio" name="renzoku" value="0" checked>ッにする</label>
				<label><input type="radio" name="renzoku" value="1">ッにしない</label>
			</p>
			<p>b、m、pの前のn</p>
			<p>
				<label><input type="radio" name="nm" value="0" checked>ン</label>
				<label><input type="radio" name="nm" value="1">ㇺ</label>
			</p>
		</div>
		<p>
			<input type="button" value="表示してクリップボードにコピー" onclick="display();">
			<span id="message"></span>
		</p>
		<textarea name="output"></textarea>
	</form>
	<script src="bookmarklet.js"></script>
</body>
</html>
